name: ci
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  verify:
    name: Build + verify (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Build + test + smoke + parity
        run: npm run check
      - name: Package readback surface
        run: |
          set -euo pipefail
          # bootstrap.sh is intentionally NOT in the tarball: it is fetched from
          # the repo over GitHub raw for the one-line install and hands off to
          # the packaged install.sh.
          npm pack --dry-run --json > pack.json
          node -e '
            const fs = require("fs");
            const out = JSON.parse(fs.readFileSync("pack.json","utf8"));
            const files = new Set(out[0].files.map((f) => f.path));
            for (const required of [
              "dist/bin/omcu.js",
              "hooks/omcu-hook.mjs",
              "hooks/hooks.json",
              "scripts/install.sh",
              ".cursor/rules/oh-my-cursor.mdc",
            ]) {
              if (!files.has(required)) { console.error("missing packaged file:", required); process.exit(1); }
            }
            console.log("package surface ok:", files.size, "files");
          '
      - name: Version sync (package/plugin manifests)
        run: |
          set -euo pipefail
          PKG="$(node -p "require('./package.json').version")"
          PLUGIN="$(node -p "require('./.cursor-plugin/plugin.json').version")"
          test "$PKG" = "$PLUGIN" || { echo "version mismatch pkg=$PKG plugin=$PLUGIN"; exit 1; }
          echo "version $PKG"
